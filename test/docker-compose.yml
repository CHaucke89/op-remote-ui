version: '3.8'

services:
  ui-simulator:
    build:
      context: ..
      dockerfile: test/Dockerfile
    image: openpilot-ui-test:latest
    container_name: openpilot-ui-simulator
    command: python test/mock_ui_simulator.py --fps 2
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - openpilot-test
    privileged: true  # Required for shared memory

  stream-server:
    build:
      context: ..
      dockerfile: test/Dockerfile
    image: openpilot-ui-test:latest
    container_name: openpilot-stream-server
    command: python stream_server.py
    ports:
      - "8081:8081"
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - openpilot-test
    depends_on:
      - ui-simulator
    privileged: true  # Required for shared memory
    environment:
      - PYTHONUNBUFFERED=1

  test-runner:
    build:
      context: ..
      dockerfile: test/Dockerfile
    image: openpilot-ui-test:latest
    container_name: openpilot-test-runner
    command: sh -c "sleep 5 && python test/integration_test.py"
    volumes:
      - /dev/shm:/dev/shm
      - ./test-results:/app/test-results
    networks:
      - openpilot-test
    depends_on:
      - stream-server
    privileged: true

networks:
  openpilot-test:
    driver: bridge